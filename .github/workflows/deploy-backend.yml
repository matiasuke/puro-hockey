name: Deploy Backend to Railway

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'package.json'
      - 'Dockerfile.backend'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.puro-hockey.com

    steps:
    - uses: actions/checkout@v3

    - name: Install Railway CLI
      run: npm install -g @railway/cli@latest

    - name: Deploy to Railway
      run: railway deploy --service backend
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    - name: Run database migrations
      run: railway run --service backend npm run migrate
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    - name: Verify deployment
      run: |
        sleep 10
        curl -f https://api.puro-hockey.com/health || exit 1

    - name: Notify Slack (optional)
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Backend deployment to Railway successful! 🚀'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit
