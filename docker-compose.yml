version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: hockey-db
    environment:
      POSTGRES_USER: hockey_user
      POSTGRES_PASSWORD: hockey_password
      POSTGRES_DB: hockey_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hockey_user -d hockey_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hockey-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hockey-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://hockey_user:hockey_password@db:5432/hockey_db
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGIN: http://localhost:3000
      PORT: 5000
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - hockey-network
    restart: unless-stopped
    command: npm run dev

  # Frontend App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: hockey-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_WS_URL=ws://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./src:/app/src
      - /app/node_modules
    networks:
      - hockey-network
    restart: unless-stopped
    command: npm run dev

networks:
  hockey-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
